<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>智能情绪分析可视化大屏</title>
<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
<style>
body {
    margin:0;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    font-family: "微软雅黑", sans-serif;
    color:white;
}

h1 {
    text-align:center;
    font-size:3em;
    margin:20px 0;
    background: linear-gradient(90deg,#ff4d4d,#ffb84d);
    -webkit-background-clip: text;
    color: transparent;
}

/* 大屏布局 */
.chart-container {
    display:flex;
    flex-wrap:wrap;
    justify-content:space-around;
    padding:20px;
}

.chart-box {
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    margin:10px;
    padding:10px;
}

/* 图表尺寸 */
#bar,#pie {
    width:600px;
    height:450px;
}

#keywords {
    width:90%;
    height:500px;
    margin:0 auto;
}

/* 滚动文章区 */
#scroll-container {
    position: relative;
    height:400px;
    overflow-y: auto; /* 支持鼠标滚轮 */
    border-top:1px solid #0ff;
    border-bottom:1px solid #0ff;
    margin:20px auto;
    width:90%;
    padding:10px;
    border-radius:12px;
    background: rgba(0,255,255,0.05);
    /* 隐藏滚动条 */
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE 10+ */
}


#scroll-container::-webkit-scrollbar {
    display: none; /* Chrome, Safari, Opera */
}
.article {
    margin-bottom:30px;
    padding:10px;
    background: rgba(0,255,255,0.05);
    border-radius:10px;
    border-left:5px solid #0ff;
}

.article h2 {
    margin:0;
    font-size:1.3em;
    color:#ffb84d;
}

.article p {
    margin:5px 0;
}

.label {
    display:inline-block;
    padding:2px 8px;
    border-radius:5px;
    font-size:0.9em;
    color:white;
    margin-top:5px;
}

/* 情绪颜色映射 */
.label.anger { background:#ff4d4d; }
.label.disgust { background:#9b59b6; }
.label.sadness { background:#3498db; }
.label.like { background:#2ecc71; }
.label.happyness { background:#f1c40f; }
.label.surprise { background:#e67e22; }

</style>
</head>
<body>

<h1>🔥 智能情绪分析可视化系统</h1>

<div class="chart-container">
    <div class="chart-box" id="bar"></div>
    <div class="chart-box" id="pie"></div>
</div>

<div class="chart-box" id="keywords"></div>

<div class="chart-box" id="scroll-container">
    <div id="scroll-list">
        <!-- 文章条目由 JS 动态生成 -->
    </div>
</div>

<script>
// =====================
// 1️⃣ 情绪柱状图 + 饼图
// =====================
fetch("/api/sentiment_stats")
.then(res => res.json())
.then(data => {
    let barChart = echarts.init(document.getElementById('bar'));
    let pieChart = echarts.init(document.getElementById('pie'));

    barChart.setOption({
        title:{text:"情绪分布柱状图",textStyle:{color:"#0ff",fontSize:20}},
        tooltip:{show:true},
        xAxis:{data:data.labels,axisLabel:{color:"#0ff",fontSize:14}},
        yAxis:{axisLabel:{color:"#0ff",fontSize:14}},
        series:[{
            type:'bar',
            data:data.counts,
            itemStyle:{
                color:new echarts.graphic.LinearGradient(0,0,0,1,
                    [{offset:0,color:'#ff4d4d'},{offset:1,color:'#ffb84d'}])
            },
            emphasis:{itemStyle:{color:'#00ffff'}}
        }],
        animationDuration:1500
    });

    pieChart.setOption({
        title:{text:"情绪比例",textStyle:{color:"#0ff",fontSize:20}},
        tooltip:{show:true,trigger:'item',formatter:'{b}: {c} ({d}%)'},
        series:[{
            type:'pie',
            radius:['40%','70%'],
            data:data.labels.map((l,i)=>({name:l,value:data.counts[i]})),
            itemStyle:{
                borderColor:'#0f172a',
                borderWidth:2
            },
            emphasis:{scale:true,scaleSize:10}
        }],
        animationDuration:1500
    });
});

// =====================
// 2️⃣ 关键词 Top20
// =====================
fetch("/api/top_keywords")
.then(res=>res.json())
.then(data=>{
    let chart = echarts.init(document.getElementById('keywords'));

    chart.setOption({
        title:{text:"🔥 热门关键词 Top20",textStyle:{color:"#0ff",fontSize:22}},
        tooltip:{show:true},
        xAxis:{
            type:'category',
            data:data.keywords,
            axisLabel:{color:"#0ff",rotate:45, fontSize:14}
        },
        yAxis:{axisLabel:{color:"#0ff",fontSize:14}},
        series:[{
            type:'bar',
            data:data.weights,
            itemStyle:{
                color:new echarts.graphic.LinearGradient(0,0,1,0,
                    [{offset:0,color:'#4dc3ff'},{offset:1,color:'#00ffff'}])
            }
        }],
        animationDuration:1500
    });
});

// =====================
// 3️⃣ 自动滚动 + 鼠标滚轮文章区
// =====================
fetch("/api/articles_with_sentiment")
.then(res => res.json())
.then(data => {
    const scrollContainer = document.getElementById('scroll-container');
    const scrollList = document.getElementById('scroll-list');

    data.forEach(article => {
        const div = document.createElement('div');
        div.className = 'article';
        div.innerHTML = `
            <h2>${article.title}</h2>
            <p>${article.content}</p>
            <span class="label ${article.label_name}">${article.label_name}</span>
        `;
        scrollList.appendChild(div);
    });

    // 自动滚动
    let scrollSpeed = 0.5; // px per frame
    function autoScroll() {
        // 当鼠标悬停时暂停自动滚动
        if (!scrollContainer.matches(':hover')) {
            scrollContainer.scrollTop += scrollSpeed;
            if (scrollContainer.scrollTop + scrollContainer.clientHeight >= scrollList.scrollHeight) {
                scrollContainer.scrollTop = 0;
            }
        }
        requestAnimationFrame(autoScroll);
    }
    autoScroll();
});
</script>

</body>
</html>
