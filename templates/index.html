<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>piggyboo</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <!-- 背景画布（最底层） -->
    <canvas id="bgCanvas"></canvas>

    <!-- 左上角：人工输入模式 -->
    <a href="/manual" class="manual-entry">人工输入模式</a>

    <!-- 页面居中容器 -->
    <div class="page-center">
        <div class="card">
            <h1 class="title">🐷 piggyboo</h1>

            <div class="input-row">
                <input id="keywordInput" placeholder="输入关键词">
                <button onclick="startCrawl()">开始分析</button>
            </div>
        </div>
    </div>

    <!-- JS 放最后，确保 DOM 已加载 -->
    <script src="/static/js/bg.js"></script>
    <script src="/static/js/crawl.js"></script>

</body>
</html>
